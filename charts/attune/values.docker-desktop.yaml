# Docker Desktop Kubernetes override values for the published Attune edge chart.
#
# Install with:
#   helm upgrade --install attune attune/attune \
#     --namespace attune --create-namespace \
#     --version 0.0.0-edge.169 \
#     -f values.docker-desktop.yaml
#
# Then expose the services locally with:
#   kubectl -n attune port-forward svc/attune-attune-api 8080:8080
#   kubectl -n attune port-forward svc/attune-attune-notifier 8081:8081
#   kubectl -n attune port-forward svc/attune-attune-web 3000:80

global:
  imageRegistry: git.rdrx.app
  imageNamespace: attune-system
  imageTag: sha-a86e4a29f275
  imagePullSecrets: []

security:
  # Development-only values for Docker Desktop. Replace for anything persistent.
  jwtSecret: docker-desktop-dev-jwt-secret-change-me-please
  encryptionKey: docker-desktop-dev-encryption-key-32b

database:
  schema: attune
  username: attune
  password: attune
  database: attune
  postgresql:
    enabled: true
    persistence:
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: 10Gi

rabbitmq:
  username: attune
  password: attune
  enabled: true
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 4Gi

bootstrap:
  testUser:
    login: test@attune.local
    displayName: Test User
    password: TestPass123!

sharedStorage:
  # Docker Desktop's default storage is single-node local storage, so RWO is
  # usually more reliable than the chart's multi-node RWX defaults.
  packs:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 2Gi
  runtimeEnvs:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 5Gi
  artifacts:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 10Gi

images:
  api:
    repository: attune/api
    pullPolicy: IfNotPresent
  executor:
    repository: attune/executor
    pullPolicy: IfNotPresent
  notifier:
    repository: attune/notifier
    pullPolicy: IfNotPresent
  web:
    repository: attune/web
    pullPolicy: IfNotPresent
  agent:
    repository: attune/agent
    pullPolicy: IfNotPresent

  # The current chart has hook jobs for migrations, default-user bootstrap,
  # and core-pack bootstrap. These repositories must exist in the registry.
  # If the install reports ImagePullBackOff for hook pods, the publish workflow
  # needs to publish these bootstrap images or the chart needs to be updated to
  # run the hooks from available images/configmaps.
  migrations:
    repository: attune/migrations
    pullPolicy: IfNotPresent
  initUser:
    repository: attune/init-user
    pullPolicy: IfNotPresent
  initPacks:
    repository: attune/init-packs
    pullPolicy: IfNotPresent

api:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080

executor:
  replicaCount: 1

notifier:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8081

mcp:
  enabled: false

web:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
  config:
    environment: docker-desktop
    apiUrl: http://localhost:8080
    wsUrl: ws://localhost:8081
  ingress:
    enabled: false

actionWorkers:
  - name: full
    image: nikolaik/python-nodejs:python3.12-nodejs22-slim
    replicas: 1
    runtimes:
      - shell
      - python
      - node
      - native
    resources: {}

sensorWorkers:
  - name: default
    image: nikolaik/python-nodejs:python3.12-nodejs22-slim
    replicas: 1
    runtimes:
      - shell
      - python
      - node
      - native
    logLevel: debug
    resources: {}
