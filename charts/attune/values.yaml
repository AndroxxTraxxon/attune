  notifier:
    repository: attune-notifier
    tag: ""
    pullPolicy: IfNotPresent
  web:
    repository: attune-web
    tag: ""
    pullPolicy: IfNotPresent
  migrations:
    repository: attune-migrations
    tag: ""
    pullPolicy: IfNotPresent
