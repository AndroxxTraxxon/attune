# News-via-Copilot Workflow Graph
# Companion graph for actions/news_via_copilot.yaml. Action-level metadata
# (ref, label, parameters, output, tags) lives on that file; this file holds
# only the execution graph.

version: "1.0"

tasks:
  - name: prompt
    action: examples.prompt_copilot
    input:
      copilot_token_key_ref: "{{ parameters.copilot_token_key_ref }}"
      prompt: >-
        You are an automation agent running inside an Attune workflow. You
        have EXACTLY ONE tool: an MCP server named "attune". You MUST NOT
        use bash, shell, curl, file system access, or any other built-in
        tool. Do not run any commands. Use ONLY the attune MCP tools listed
        when you call actions_list. Steps you must follow exactly: (1) Call
        the attune MCP tool actions_list to verify the action
        "core.http_request" is visible. (2) Call the attune MCP tool
        actions_execute with arguments
        {"action_ref":"core.http_request","parameters":{"url":"{{ parameters.news_endpoint }}","method":"GET"}}
        and wait for the result. (3) Inspect the returned execution result.
        The HTTP response body will be available as parsed JSON; from it
        pick the single top story (the first hit). (4) Compose a 1-2
        sentence plain-language summary of it. (5) Your FINAL message must
        be ONLY a single JSON object on its own line, with NO surrounding
        prose, markdown, or code fences, in this exact shape:
        {"headline":"<title>","url":"<article URL>","summary":"<1-2 sentence summary>"}
        If the MCP call fails for any reason, your final message must
        still be that single JSON object with headline="(unavailable)",
        url="", and a summary describing what failed. Remember - DO NOT
        use shell, bash, or curl; use ONLY the attune MCP tools.
    next:
      - when: "{{ succeeded() }}"
        publish:
          - copilot_envelope: "{{ result().data }}"
        do:
          - announce
      - when: "{{ failed() }}"
        do:
          - announce_failure

  - name: announce
    action: core.echo
    input:
      message: "Copilot final_output: {{ workflow.copilot_envelope.final_output }}"

  - name: announce_failure
    action: core.echo
    input:
      message: "Copilot prompt task failed; see execution logs for details."

output_map:
  headline: "{{ workflow.copilot_envelope.final_output.headline }}"
  url: "{{ workflow.copilot_envelope.final_output.url }}"
  summary: "{{ workflow.copilot_envelope.final_output.summary }}"
  markdown: |-
    # {{ workflow.copilot_envelope.final_output.headline }}

    [Read the original article]({{ workflow.copilot_envelope.final_output.url }})

    {{ workflow.copilot_envelope.final_output.summary }}
  raw_final_output: "{{ workflow.copilot_envelope.final_output }}"
