# Prompt Copilot Action
# Run a one-shot GitHub Copilot CLI prompt with execution-scoped Attune MCP access.
# The action wires the local attune-mcp binary into Copilot's MCP config so the
# agent can call Attune tools (actions.list, actions.execute, etc.) using the
# current execution's API token.

ref: examples.prompt_copilot
label: "Prompt Copilot"
description: "Run a one-shot GitHub Copilot CLI prompt against the Attune MCP server using the execution's scoped API token. Returns a JSON envelope with the agent's final output."
enabled: true

runner_type: shell
entry_point: prompt_copilot.sh
required_worker_runtimes:
  node: ">=20"

parameter_delivery: stdin
parameter_format: json

# This action launches an AI agent that may invoke arbitrary Attune actions via
# the MCP server using the execution's scoped API token. Hint to the UI that
# child executions may exist so the workflow / subtask panels render.
accesses_mcp: true

# Action stdout is a JSON envelope produced by the entry point.
output_format: json

parameters:
  prompt:
    type: string
    description: "Prompt to send to GitHub Copilot CLI"
    required: true
  copilot_command:
    type: string
    description: "Optional path to the GitHub Copilot CLI executable; when omitted the action prefers the pack-installed Node.js environment for this pack"
  copilot_token:
    type: string
    description: "Optional GitHub token with Copilot Requests permission; exported as GH_TOKEN"
    secret: true
  copilot_token_key_ref:
    type: string
    description: "Optional Attune key ref containing the GitHub Copilot token; fetched with the execution token at runtime"
  mcp_command:
    type: string
    description: "Path to the attune-mcp binary available to the action"
    default: "/opt/attune/agent/attune-mcp"
  attune_command:
    type: string
    description: "Path to the Attune CLI binary used for key-backed token lookup"
    default: "/opt/attune/agent/attune"
  disable_builtin_mcps:
    type: boolean
    description: "Disable Copilot's built-in GitHub MCP server so prompts focus on Attune MCP tools"
    default: true
  working_dir:
    type: string
    description: "Optional working directory for the Copilot run"

# Output schema (StackStorm-style flat format) describing the JSON envelope.
out_schema:
  final_output:
    type: object
    description: "Either the parsed JSON object Copilot emitted, or a wrapper { text: <raw stdout> } when stdout was not valid JSON"
  raw_text:
    type: boolean
    description: "True when Copilot's stdout could not be parsed as JSON and was wrapped as a string"
  exit_code:
    type: integer
    description: "Exit code returned by the GitHub Copilot CLI process"

tags:
  - example
  - copilot
  - ai
  - mcp
