# News-via-Copilot Workflow
# A two-task demo workflow showing AI-in-Attune end to end:
#   1. Prompt GitHub Copilot CLI (with execution-scoped Attune MCP) to discover
#      Attune actions, call core.http_request against a public news endpoint,
#      and return a structured JSON summary of the top article.
#   2. Echo the agent's summary via core.echo so the result surfaces in the
#      workflow's output and execution log.

ref: examples.news_via_copilot
label: "News via Copilot"
description: "Demo workflow that asks GitHub Copilot CLI to discover and use Attune MCP tools to fetch a recent news article, then pipes the summary to core.echo."
enabled: true

# This action is purely a workflow definition; the execution graph lives in
# actions/workflows/news_via_copilot.workflow.yaml.
workflow_file: workflows/news_via_copilot.workflow.yaml

parameters:
  copilot_token_key_ref:
    type: string
    description: "Attune key ref containing a Copilot-enabled GitHub PAT (fetched at runtime with the execution token)"
    required: true
  news_endpoint:
    type: string
    description: "Public HTTP endpoint Copilot should call via core.http_request to fetch news. Defaults to the Hacker News Algolia front page API."
    default: "https://hn.algolia.com/api/v1/search?tags=front_page&hitsPerPage=1"

output:
  headline:
    type: string
    description: "Headline returned by Copilot, when available"
  url:
    type: string
    description: "URL of the article, when available"
  summary:
    type: string
    description: "Short summary returned by Copilot"
  markdown:
    type: string
    description: "Markdown-formatted document containing the headline, link, and summary"
  raw_final_output:
    type: object
    description: "Full final_output envelope returned by examples.prompt_copilot"

tags:
  - example
  - copilot
  - ai
  - mcp
  - workflow
  - demo
