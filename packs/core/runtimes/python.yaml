ref: core.python
pack_ref: core
name: Python
description: Python 3 runtime for actions and sensors with automatic environment management

distributions:
  verification:
    commands:
      - binary: python3
        args:
          - "--version"
        exit_code: 0
        pattern: "Python 3\\."
        priority: 1
      - binary: python
        args:
          - "--version"
        exit_code: 0
        pattern: "Python 3\\."
        priority: 2
  min_version: "3.8"
  recommended_version: "3.11"

installation:
  package_managers:
    - pip
    - pipenv
    - poetry
  virtual_env_support: true

execution_config:
  interpreter:
    binary: python3
    args:
      - "-u"
    file_extension: ".py"
  environment:
    env_type: virtualenv
    dir_name: ".venv"
    create_command:
      - python3
      - "-m"
      - venv
      - "--copies"
      - "{env_dir}"
    interpreter_path: "{env_dir}/bin/python3"
  dependencies:
    manifest_file: requirements.txt
    install_command:
      - "{interpreter}"
      - "-m"
      - pip
      - install
      - "-r"
      - "{manifest_path}"
