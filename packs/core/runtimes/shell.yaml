ref: core.shell
pack_ref: core
name: Shell
description: Shell (bash/sh) runtime for script execution - always available

distributions:
  verification:
    commands:
      - binary: sh
        args:
          - "--version"
        exit_code: 0
        optional: true
        priority: 1
      - binary: bash
        args:
          - "--version"
        exit_code: 0
        optional: true
        priority: 2
    always_available: true

installation:
  interpreters:
    - sh
    - bash
    - dash
  portable: true
