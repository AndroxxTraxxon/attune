ref: core.ask
label: "Ask"
description: "Pause a workflow task until a human inquiry response is submitted"
enabled: true

runner_type: native
entry_point: ask
parameter_delivery: stdin
parameter_format: json
output_format: json

parameters:
  prompt:
    type: string
    description: "Prompt shown to the responder"
    required: true
  response_schema:
    type: object
    description: "Expected shape of the response payload"
  assigned_to:
    type: integer
    description: "Optional identity id assigned to answer the inquiry"

output:
  response:
    type: object
    description: "Submitted inquiry response"

tags:
  - workflow
  - inquiry
  - approval
