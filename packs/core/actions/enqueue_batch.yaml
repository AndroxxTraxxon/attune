# Enqueue Batch Action - Core Pack
# Inserts a collection of records into a configured work queue.
#
# Implemented as a statically-linked native binary that ships with the core
# pack (zero external runtime dependencies). Reads parameters as a single
# JSON document from stdin and issues one POST to
# /api/v1/queues/{queue_ref}/items per item, aggregating per-item results.
#
# Each entry in `items` may be either:
#   * a bare payload (object/scalar/array), or
#   * an envelope `{ payload, item_key?, priority?, metadata? }` for
#     per-item overrides on top of the action-wide shared defaults.

ref: core.enqueue_batch
label: "Enqueue Queue Items (Batch)"
description: "Insert a collection of records into a work queue. Optional shared priority and metadata apply when not overridden per-item."
enabled: true

runner_type: native

entry_point: attune-core-enqueue-batch

parameter_delivery: stdin
parameter_format: json

output_format: json

parameters:
  queue_ref:
    type: string
    description: "Reference of the work queue to insert into (e.g., core.inbox)."
    required: true
  items:
    type: array
    description: "Records to enqueue. Each entry is either a bare payload or a {payload, item_key?, priority?, metadata?} envelope."
    required: true
  priority:
    type: integer
    description: "Shared priority applied to every item that doesn't override it. If omitted, the queue's default_priority applies."
  metadata:
    type: object
    description: "Shared metadata applied to every item that doesn't override it."
  item_key_field:
    type: string
    description: "Optional dotted JSON path within each payload whose value should be used as that item's idempotency key (e.g., 'Id' or 'attributes.url')."

output_schema:
  success:
    type: boolean
    description: "True only if every item was enqueued successfully."
  count:
    type: integer
    description: "Total number of items processed."
  succeeded:
    type: integer
    description: "Number of items that were enqueued successfully."
  failed:
    type: integer
    description: "Number of items that failed to enqueue."
  items:
    type: array
    description: "Per-item result rows: { index, success, id?, queue?, item_key?, priority?, status?, error?, http_status? }."

tags:
  - core
  - queues
  - enqueue
  - batch
