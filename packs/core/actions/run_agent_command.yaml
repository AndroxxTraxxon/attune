# Run Agent Command Action
# Launch an AI/agent command with execution-scoped Attune MCP access.

ref: core.run_agent_command
label: "Run Agent Command"
description: "Run an agent command with execution-scoped MCP access through the local attune-mcp binary"
enabled: true

runner_type: shell
entry_point: run_agent_command.sh

parameter_delivery: stdin
parameter_format: dotenv

output_format: text

parameters:
  command:
    type: string
    description: "Shell command to run for the agent harness"
    required: true
  working_dir:
    type: string
    description: "Optional working directory for the agent command"
  mcp_command:
    type: string
    description: "Path to the attune-mcp binary available inside the worker container"
    default: "/opt/attune/agent/attune-mcp"
  state_dir:
    type: string
    description: "Optional directory for agent transcript/state files"
  require_mcp_binary:
    type: boolean
    description: "Fail if the attune-mcp binary is not available"
    default: true

tags:
  - ai
  - agent
  - mcp
  - workflow
