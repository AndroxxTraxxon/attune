# Attune Configuration
# See https://git.rdrx.app/attune/attune for full documentation
#
# Override any setting with environment variables using the prefix ATTUNE__
# and double underscores as separators. Example:
#   ATTUNE__DATABASE__URL=postgresql://user:pass@host/attune
#   ATTUNE__SERVER__PORT=8080

# Database connection
database:
  url: "postgresql://attune:attune@localhost:5432/attune"
  max_connections: 10

# API server
server:
  host: "0.0.0.0"
  port: 8080

# Notifier (WebSocket) server
notifier:
  host: "0.0.0.0"
  port: 8081

# RabbitMQ message queue
rabbitmq:
  url: "amqp://attune:attune@localhost:5672/attune"

# Security settings
security:
  # IMPORTANT: Change these in production!
  # jwt_secret: "change-me-in-production-use-at-least-32-characters"
  # encryption_key: "change-me-in-production-use-at-least-32-characters"
  password_min_length: 8

# File paths (FHS-compliant defaults for package installs)
packs_base_dir: "/var/lib/attune/packs"
runtime_envs_dir: "/var/lib/attune/runtime_envs"
artifacts_dir: "/var/lib/attune/artifacts"

# Runtime database retention (applied by attune-supervisor)
retention:
  enabled: true
  check_interval_seconds: 3600
  batch_size: 1000
  dry_run: false
  targets:
    events:
      max_age_seconds: 7776000
    executions:
      max_age_seconds: 7776000
    audit_events:
      max_age_seconds: 31536000

maintenance:
  enabled: true
  artifact_cleanup_enabled: true
  artifact_cleanup_batch_size: 100
  monitoring_enabled: true
  corrective_actions_enabled: true
  stuck_execution_seconds: 3600
  execution_remediation_seconds: 7200
  stuck_queue_seconds: 900
  queue_remediation_seconds: 1800
  admission_remediation_seconds: 1800
  retention_lag_alert_seconds: 86400
  alert_limit_per_cycle: 25
  alert_cooldown_seconds: 3600

# Agent binary directory (for serving agent downloads)
agent:
  binary_dir: "/var/lib/attune/agent"

# Logging
# Set via RUST_LOG environment variable, e.g.:
#   RUST_LOG=info,attune_api=debug
