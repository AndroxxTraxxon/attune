[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # jsonwebtoken's RSA support is required for verifying external RS256 OIDC ID tokens.
    # No patched rsa release is available yet for RUSTSEC-2023-0071, so tolerate it until
    # the upstream ecosystem provides a safe replacement or fix.
    "RUSTSEC-2023-0071",
]

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
    "MIT-0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = []
skip = [
    "winnow@0.6.26",
    "winnow@0.7.15",
    "windows_x86_64_msvc@0.42.2",
    "windows_x86_64_msvc@0.48.5",
    "windows_x86_64_msvc@0.52.6",
    "windows_x86_64_msvc@0.53.1",
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
