# RRULE Timer Trigger
# Fires based on iCalendar (RFC 5545) recurrence rules.
#
# Use this trigger when standard cron and simple intervals can't express
# the schedule you need - for example "every other Monday at 9am",
# "the 2nd Tuesday of each month", or "the last weekday of each month".
#
# RRULE parts are exposed as discrete, type-checked parameters. The sensor
# assembles them into a canonical RFC 5545 recurrence rule internally.
# An advanced `rule` escape hatch is also accepted for edge cases.

ref: core.rruletimer
label: "RRULE Timer"
description: "Fires based on an RFC 5545 recurrence rule, configured via discrete parameters (freq, interval, by_day, ...) instead of a single opaque string."
enabled: true

# Trigger type
type: rrule

# Parameter schema - configuration for the trigger instance
parameters:
  freq:
    type: string
    description: "Recurrence frequency. Required unless `rule` is provided."
    enum:
      - SECONDLY
      - MINUTELY
      - HOURLY
      - DAILY
      - WEEKLY
      - MONTHLY
      - YEARLY
  interval:
    type: integer
    description: "Number of frequency units between fires (default 1). Example: freq=WEEKLY + interval=2 = every other week."
    minimum: 1
  count:
    type: integer
    description: "Stop after this many occurrences. Mutually exclusive with `until`."
    minimum: 1
  until:
    type: string
    format: date-time
    description: "Stop after this datetime (RFC 3339 / ISO 8601). Mutually exclusive with `count`."
  by_day:
    type: array
    description: "Days of the week, optionally prefixed with an ordinal. Examples: ['MO'], ['MO','WE','FR'], ['2TU'] (2nd Tuesday), ['-1FR'] (last Friday)."
    items:
      type: string
  by_month_day:
    type: array
    description: "Days of the month (1..31, or -1..-31 from end). Example: [1, 15] for the 1st and 15th."
    items:
      type: integer
  by_month:
    type: array
    description: "Months of the year (1..12)."
    items:
      type: integer
  by_year_day:
    type: array
    description: "Days of the year (1..366, or -1..-366 from end)."
    items:
      type: integer
  by_week_no:
    type: array
    description: "ISO week numbers (1..53)."
    items:
      type: integer
  by_hour:
    type: array
    description: "Hours of the day (0..23)."
    items:
      type: integer
  by_minute:
    type: array
    description: "Minutes of the hour (0..59)."
    items:
      type: integer
  by_second:
    type: array
    description: "Seconds of the minute (0..60)."
    items:
      type: integer
  by_set_pos:
    type: array
    description: "Positional filter applied to the candidate set. Common pattern: combine with by_day to pick the Nth weekday (e.g. by_day=[MO,TU,WE,TH,FR], by_set_pos=[-1] = last weekday of the period)."
    items:
      type: integer
  week_start:
    type: string
    description: "First day of the week (affects how WEEKLY rules with by_day are interpreted)."
    enum:
      - MO
      - TU
      - WE
      - TH
      - FR
      - SA
      - SU
  dtstart:
    type: string
    format: date-time
    description: "Anchor instant for the recurrence (RFC 3339 datetime). Required by RFC 5545; the recurrence is computed relative to this point in time."
    required: true
  timezone:
    type: string
    description: "IANA timezone name (e.g., 'America/New_York'). When set, dtstart is interpreted in this timezone so wall-clock semantics survive daylight-saving transitions. Defaults to UTC."
  rule:
    type: string
    description: "Advanced escape hatch: a raw RRULE body (e.g., 'FREQ=WEEKLY;INTERVAL=2;BYDAY=MO'). When provided, it overrides all of the structured fields above. Prefer the structured fields for normal use."
  description:
    type: string
    description: "Human-readable description of the schedule"

# Payload schema - data emitted when trigger fires
output:
  type:
    type: string
    const: rrule
    description: "Trigger type identifier"
    required: true
  fired_at:
    type: string
    format: date-time
    description: "Timestamp when the trigger fired"
    required: true
  scheduled_at:
    type: string
    format: date-time
    description: "Timestamp the occurrence was scheduled for"
    required: true
  delay_ms:
    type: integer
    description: "Difference between fired_at and scheduled_at in milliseconds"
  execution_count:
    type: integer
    description: "Number of times this trigger has fired"
  sensor_ref:
    type: string
    description: "Reference to the sensor that generated this event"

# Tags for categorization
tags:
  - timer
  - rrule
  - recurrence
  - scheduler
  - periodic

# Documentation
examples:
  - description: "Every other Monday at 9:00 AM Eastern"
    parameters:
      freq: WEEKLY
      interval: 2
      by_day: [MO]
      dtstart: "2026-05-04T13:00:00Z"
      timezone: "America/New_York"
      description: "Biweekly Monday standup"

  - description: "Every 4 weeks on Friday at noon UTC"
    parameters:
      freq: WEEKLY
      interval: 4
      by_day: [FR]
      by_hour: [12]
      by_minute: [0]
      dtstart: "2026-05-01T12:00:00Z"

  - description: "2nd Tuesday of every month at 3:00 PM"
    parameters:
      freq: MONTHLY
      by_day: ["2TU"]
      by_hour: [15]
      by_minute: [0]
      dtstart: "2026-05-12T15:00:00Z"

  - description: "Last weekday of every month at 5:00 PM"
    parameters:
      freq: MONTHLY
      by_day: [MO, TU, WE, TH, FR]
      by_set_pos: [-1]
      by_hour: [17]
      by_minute: [0]
      dtstart: "2026-05-29T17:00:00Z"

  - description: "1st and 15th of each month at 9:00 AM"
    parameters:
      freq: MONTHLY
      by_month_day: [1, 15]
      by_hour: [9]
      by_minute: [0]
      dtstart: "2026-05-01T09:00:00Z"

# Notes:
#   - dtstart anchors the recurrence; the first fire is the first occurrence
#     of the rule that is strictly after "now".
#   - When timezone is set, dtstart's wall-clock time is interpreted in that
#     timezone, so DST transitions shift the absolute fire time.
#   - count and until are mutually exclusive (RFC 5545 §3.3.10).
#   - The raw `rule` parameter is an escape hatch; prefer the structured
#     fields. If you do use it, omit the leading 'RRULE:' prefix (it is
#     stripped automatically) and do not embed DTSTART in it.
