name: hello
ref: python-pack.hello
description: "Python hello world action"
runner_type: python
enabled: true
entry_point: hello.py

parameters:
  type: object
  properties:
    name:
      type: string
      description: "Name to greet"
      default: "Python User"
    count:
      type: integer
      description: "Number of times to greet"
      default: 1
      minimum: 1
      maximum: 10
  required: []

output:
  type: object
  properties:
    greetings:
      type: array
      items:
        type: string
      description: "List of greeting messages"
    total_count:
      type: integer
      description: "Total number of greetings"

tags:
  - python
  - example
