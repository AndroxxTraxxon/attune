# Attune Test Environment Configuration
# This file overrides base config.yaml settings for testing

environment: test

# Test database (uses separate database to avoid conflicts)
database:
  url: postgresql://attune:attune@localhost:5432/attune_test
  max_connections: 10
  min_connections: 2
  connect_timeout: 10
  idle_timeout: 60
  log_statements: false # Usually disabled in tests for cleaner output
  schema: null # Will be set per-test in test context

# Test message queue (optional)
message_queue:
  url: amqp://guest:guest@localhost:5672/%2f
  exchange: attune_test
  enable_dlq: false
  message_ttl: 300

# Test server
server:
  host: 127.0.0.1
  port: 0 # Use random available port for tests
  request_timeout: 10
  enable_cors: true
  cors_origins:
    - http://localhost:3000
  max_body_size: 1048576 # 1MB (smaller for tests)

# Test logging (minimal for cleaner test output)
log:
  level: warn # Only show warnings and errors during tests
  format: pretty
  console: true

# Test security (use fixed values for reproducible tests)
security:
  jwt_secret: test-secret-for-testing-only-not-secure
  jwt_access_expiration: 300 # 5 minutes
  jwt_refresh_expiration: 3600 # 1 hour
  encryption_key: test-encryption-key-32-chars-okay
  enable_auth: true
  allow_self_registration: true

# Test packs directory (use /tmp for tests to avoid permission issues)
packs_base_dir: /tmp/attune-test-packs

# Test runtime environments directory (virtualenvs, node_modules, etc.)
# Isolated from pack directories to keep packs clean and read-only.
runtime_envs_dir: /tmp/attune-test-runtime-envs

# Test pack registry
pack_registry:
  enabled: true
  default_registry: https://registry.attune.example.com
  cache_ttl: 300
  allowed_source_hosts:
    - registry.attune.example.com

# Runtime retention is available in tests but runs in dry-run mode by default.
retention:
  enabled: true
  check_interval_seconds: 3600
  batch_size: 100
  dry_run: true

maintenance:
  enabled: true
  artifact_cleanup_enabled: true
  artifact_cleanup_batch_size: 25
  monitoring_enabled: true
  corrective_actions_enabled: true
  stuck_execution_seconds: 3600
  execution_remediation_seconds: 7200
  stuck_queue_seconds: 900
  queue_remediation_seconds: 1800
  admission_remediation_seconds: 1800
  retention_lag_alert_seconds: 86400
  alert_limit_per_cycle: 25
  alert_cooldown_seconds: 3600

