name: Publish Images and Helm Chart

on:
  workflow_dispatch:
    inputs:
      target_arch:
        description: Architecture to publish
        type: choice
        options:
          - all
          - amd64
          - arm64
        default: all
      target_image:
        description: Image to publish
        type: choice
        options:
          - all
          - api
          - executor
          - notifier
          - supervisor
          - agent
          - docker-dist
          - helm-chart
          - linux-packages
          - web
        default: all
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

env:
  REGISTRY_HOST: ${{ vars.CLUSTER_GITEA_HOST }}
  REGISTRY_NAMESPACE: ${{ vars.CONTAINER_REGISTRY_NAMESPACE }}
  REGISTRY_PLAIN_HTTP: ${{ vars.CONTAINER_REGISTRY_INSECURE }}
  ARTIFACT_REPOSITORY: attune/build-artifacts
  GNU_GLIBC_VERSION: "2.28"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_MIN_STACK: 67108864
  SQLX_OFFLINE: true
  RUNNER_TOOL_CACHE: /toolcache

jobs:
  metadata:
    name: Resolve Publish Metadata
    runs-on: build-amd64
    outputs:
      registry: ${{ steps.meta.outputs.registry }}
      namespace: ${{ steps.meta.outputs.namespace }}
      registry_plain_http: ${{ steps.meta.outputs.registry_plain_http }}
      gitea_base_url: ${{ steps.meta.outputs.gitea_base_url }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_tags: ${{ steps.meta.outputs.image_tags }}
      chart_version: ${{ steps.meta.outputs.chart_version }}
      artifact_ref_base: ${{ steps.meta.outputs.artifact_ref_base }}
    steps:
      - name: Resolve tags and registry paths
        id: meta
        shell: bash
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          COMMIT_SHA: ${{ github.sha }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          registry="${REGISTRY_HOST}"
          namespace="${REGISTRY_NAMESPACE}"
          registry_plain_http_raw="${REGISTRY_PLAIN_HTTP:-}"
          registry_host_only="${registry%%:*}"
          registry_plain_http_default="false"

          if [ -z "$registry" ]; then
            echo "CLUSTER_GITEA_HOST app variable is required"
            exit 1
          fi

          if [ -z "$namespace" ]; then
            namespace="${REPOSITORY_OWNER}"
          fi

          if printf '%s' "$registry_host_only" | grep -Eq '(^|[.])svc[.]cluster[.]local$'; then
            registry_plain_http_default="true"
          fi

          if [ -n "$registry_plain_http_raw" ]; then
            case "$(printf '%s' "$registry_plain_http_raw" | tr '[:upper:]' '[:lower:]')" in
              1|true|yes|on)
                registry_plain_http="true"
                ;;
              0|false|no|off)
                registry_plain_http="false"
                ;;
              *)
                echo "CONTAINER_REGISTRY_INSECURE must be a boolean when set"
                exit 1
                ;;
            esac
          else
            registry_plain_http="$registry_plain_http_default"
          fi

          if [ "$registry_plain_http" = "true" ]; then
            gitea_base_url="http://${registry}"
          else
            gitea_base_url="https://${registry}"
          fi

          short_sha="$(printf '%s' "${COMMIT_SHA}" | cut -c1-12)"
          ref_type="${REF_TYPE}"
          ref_name="${REF_NAME}"

          if [ "$ref_type" = "tag" ] && printf '%s' "$ref_name" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$'; then
            version="${ref_name#v}"
            image_tags="${version},latest,sha-${short_sha}"
            chart_version="${version}"
          else
            version="sha-${short_sha}"
            image_tags="edge,sha-${short_sha}"
            chart_version="0.0.0-edge.${RUN_NUMBER}"
          fi

          artifact_ref_base="${registry}/${namespace}/${ARTIFACT_REPOSITORY}"

          {
            echo "registry=$registry"
            echo "namespace=$namespace"
            echo "registry_plain_http=$registry_plain_http"
             echo "gitea_base_url=$gitea_base_url"
             echo "image_tag=$version"
             echo "image_tags=$image_tags"
             echo "chart_version=$chart_version"
             echo "artifact_ref_base=$artifact_ref_base"
           } >> "$GITHUB_OUTPUT"

  changes:
    name: Detect Changed Paths
    runs-on: build-amd64
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      helm: ${{ steps.filter.outputs.helm }}
      web: ${{ steps.filter.outputs.web }}
      docker_dist: ${{ steps.filter.outputs.docker_dist }}
      linux_packages: ${{ steps.filter.outputs.linux_packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          TARGET_IMAGE: ${{ inputs.target_image }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          rust="false"
          helm="false"
          web="false"
          docker_dist="false"
          linux_packages="false"

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            target="${TARGET_IMAGE}"
            case "$target" in
              all)
                rust="true"; helm="true"; web="true"; docker_dist="true"; linux_packages="true" ;;
              api|executor|notifier|supervisor|agent)
                rust="true" ;;
              helm-chart)
                helm="true" ;;
              linux-packages)
                linux_packages="true"; rust="true" ;;
              web)
                web="true" ;;
              docker-dist)
                docker_dist="true" ;;
            esac
          else
            before="${BEFORE_SHA}"
            after="${AFTER_SHA}"

            if [ "$before" = "0000000000000000000000000000000000000000" ]; then
              rust="true"; helm="true"; web="true"; docker_dist="true"; linux_packages="true"
            else
              while IFS= read -r f; do
                if [ "$f" = ".gitea/workflows/publish.yml" ]; then
                  rust="true"; helm="true"; web="true"; docker_dist="true"; linux_packages="true"
                  continue
                fi
                if printf '%s' "$f" | grep -qE '^(crates/|Cargo\.toml$|Cargo\.lock$|docker/Dockerfile\.(runtime|agent|agent-package)$)'; then
                  rust="true"
                  linux_packages="true"
                fi
                if printf '%s' "$f" | grep -qE '^charts/'; then
                  helm="true"
                fi
                if printf '%s' "$f" | grep -qE '^(web/|docker/Dockerfile\.web$)'; then
                  web="true"
                fi
                if printf '%s' "$f" | grep -qE '^docker/distributable/'; then
                  docker_dist="true"
                fi
                if printf '%s' "$f" | grep -qE '^packaging/'; then
                  linux_packages="true"
                fi
              done < <(git diff --name-only "$before" "$after")
            fi
          fi

          {
            echo "rust=$rust"
            echo "helm=$helm"
            echo "web=$web"
            echo "docker_dist=$docker_dist"
            echo "linux_packages=$linux_packages"
          } >> "$GITHUB_OUTPUT"

          echo "Changed path flags: rust=$rust helm=$helm web=$web docker_dist=$docker_dist linux_packages=$linux_packages"

  build-rust-bundles:
    name: Build Rust Bundles (${{ matrix.arch }})
    runs-on: ${{ matrix.runner_label }}
    needs:
      - metadata
      - changes
    if: |
      needs.changes.outputs.rust == 'true' &&
      (github.event_name != 'workflow_dispatch' ||
      inputs.target_arch == 'all' ||
      inputs.target_arch == matrix.arch)
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner_label: build-amd64
            service_rust_target: x86_64-unknown-linux-gnu
            service_target: x86_64-unknown-linux-gnu.2.28
            musl_target: x86_64-unknown-linux-musl
          - arch: arm64
            runner_label: build-amd64
            service_rust_target: aarch64-unknown-linux-gnu
            service_target: aarch64-unknown-linux-gnu.2.28
            musl_target: aarch64-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-publish-${{ runner.os }}-${{ matrix.arch }}-stable-v1
          restore-keys: |
            rustup-${{ runner.os }}-${{ matrix.arch }}-stable-v1
            rustup-${{ runner.os }}-stable-v1
            rustup-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            ${{ matrix.service_rust_target }}
            ${{ matrix.musl_target }}

      - name: Cache Cargo registry + index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-publish-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-publish-${{ matrix.arch }}-
            cargo-registry-

      - name: Cache Cargo build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-publish-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs', '**/Cargo.toml') }}
          restore-keys: |
            cargo-publish-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}-
            cargo-publish-${{ matrix.arch }}-

      - name: Install native build dependencies
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y pkg-config libssl-dev file binutils python3 python3-pip

      - name: Install Zig
        shell: bash
        run: |
          set -euo pipefail
          pip3 install --break-system-packages --no-cache-dir ziglang

      - name: Install cargo-zigbuild
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v cargo-zigbuild >/dev/null 2>&1; then
            cargo install --locked cargo-zigbuild
          fi

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          cargo zigbuild --release \
            --target "${{ matrix.service_target }}" \
            --bin attune-api \
            --bin attune-executor \
            --bin attune-notifier \
            --bin attune-supervisor

      - name: Verify minimum glibc requirement
        shell: bash
        run: |
          set -euo pipefail
          output_dir="target/${{ matrix.service_rust_target }}/release"

          get_min_glibc() {
            local file_path="$1"
            readelf -W --version-info --dyn-syms "$file_path" \
              | grep 'Name: GLIBC_' \
              | sed -E 's/.*GLIBC_([0-9.]+).*/\1/' \
              | sort -t . -k1,1n -k2,2n \
              | tail -n 1
          }

          version_gt() {
            [ "$(printf '%s\n%s\n' "$1" "$2" | sort -V | tail -n 1)" = "$1" ] && [ "$1" != "$2" ]
          }

          for binary in attune-api attune-executor attune-notifier attune-supervisor; do
            min_glibc="$(get_min_glibc "${output_dir}/${binary}")"
            if [ -z "${min_glibc}" ]; then
              echo "Failed to determine glibc requirement for ${binary}"
              exit 1
            fi
            echo "${binary} requires glibc ${min_glibc}"
            if version_gt "${min_glibc}" "${GNU_GLIBC_VERSION}"; then
              echo "Expected ${binary} to require glibc <= ${GNU_GLIBC_VERSION}, got ${min_glibc}"
              exit 1
            fi
          done

      - name: Build static agent binaries
        shell: bash
        run: |
          set -euo pipefail
          cargo zigbuild --release \
            --target "${{ matrix.musl_target }}" \
            --bin attune-agent \
            --bin attune-sensor-agent \
            --bin attune-mcp \
            --bin attune

      - name: Assemble binary bundle
        shell: bash
        env:
          BUNDLE_ARCH: ${{ matrix.arch }}
          SERVICE_RUST_TARGET: ${{ matrix.service_rust_target }}
          MUSL_TARGET: ${{ matrix.musl_target }}
          COMMIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
          IMAGE_TAG: ${{ needs.metadata.outputs.image_tag }}
        run: |
          set -euo pipefail

          bundle_root="dist/bundle/${BUNDLE_ARCH}"
          service_output_dir="target/${SERVICE_RUST_TARGET}/release"
          mkdir -p "$bundle_root/bin" "$bundle_root/agent"

          cp "${service_output_dir}/attune-api" "$bundle_root/bin/"
          cp "${service_output_dir}/attune-executor" "$bundle_root/bin/"
          cp "${service_output_dir}/attune-notifier" "$bundle_root/bin/"
          cp "${service_output_dir}/attune-supervisor" "$bundle_root/bin/"
          cp "target/${MUSL_TARGET}/release/attune-agent" "$bundle_root/agent/"
          cp "target/${MUSL_TARGET}/release/attune-sensor-agent" "$bundle_root/agent/"
          cp "target/${MUSL_TARGET}/release/attune-mcp" "$bundle_root/agent/"
          cp "target/${MUSL_TARGET}/release/attune" "$bundle_root/agent/"

          cat > "$bundle_root/metadata.json" <<EOF
          {
            "git_sha": "${COMMIT_SHA}",
            "ref": "${GIT_REF}",
            "arch": "${BUNDLE_ARCH}",
            "image_tag": "${IMAGE_TAG}"
          }
          EOF

          tar -C "dist/bundle/${BUNDLE_ARCH}" -czf "dist/attune-binaries-${BUNDLE_ARCH}.tar.gz" .

      - name: Publish binary bundle generic package
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
          GITHUB_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
          BUNDLE_ARCH: ${{ matrix.arch }}
          IMAGE_TAG: ${{ needs.metadata.outputs.image_tag }}
          GITEA_BASE_URL: ${{ needs.metadata.outputs.gitea_base_url }}
          PACKAGE_NAMESPACE: ${{ needs.metadata.outputs.namespace }}
        run: |
          set -euo pipefail
          registry_username="${REGISTRY_USERNAME:-${GITHUB_ACTOR_NAME}}"
          registry_password="${REGISTRY_PASSWORD:-${GITHUB_TOKEN_FALLBACK:-}}"
          artifact_file="attune-binaries-${BUNDLE_ARCH}.tar.gz"
          package_name="$(basename "${ARTIFACT_REPOSITORY}")-${BUNDLE_ARCH}"
          package_version="rust-binaries-${IMAGE_TAG}"
          package_url="${GITEA_BASE_URL}/api/packages/${PACKAGE_NAMESPACE}/generic/${package_name}/${package_version}/${artifact_file}"

          if [ -z "$registry_password" ]; then
            echo "Set CONTAINER_REGISTRY_PASSWORD or enable GITHUB_TOKEN package writes"
            exit 1
          fi

          cp "dist/${artifact_file}" "${artifact_file}"

          echo "Publishing binary bundle generic package"
          echo "  package_name: ${package_name}"
          echo "  package_version: ${package_version}"
          echo "  package_url: ${package_url}"
          echo "  artifact_file: ${artifact_file}"

          # Generic packages reject overwriting the same file name. Delete it first on reruns.
          delete_status="$(curl -sS -o /tmp/rust-binaries-delete-response.txt -w '%{http_code}' \
            -u "${registry_username}:${registry_password}" \
            -X DELETE \
            "${package_url}")"

          case "${delete_status}" in
            204|404)
              ;;
            *)
              echo "Failed to prepare binary bundle upload target"
              cat /tmp/rust-binaries-delete-response.txt
              exit 1
              ;;
          esac

          upload_status="$(curl -sS -o /tmp/rust-binaries-upload-response.txt -w '%{http_code}' \
            -u "${registry_username}:${registry_password}" \
            --upload-file "${artifact_file}" \
            -X PUT \
            "${package_url}")"

          case "${upload_status}" in
            201)
              ;;
            *)
              echo "Failed to publish binary bundle generic package"
              cat /tmp/rust-binaries-upload-response.txt
              exit 1
              ;;
          esac

  publish-linux-packages:
    name: Publish Linux Packages (${{ matrix.arch }})
    runs-on: ${{ matrix.runner_label }}
    needs:
      - metadata
      - changes
      - build-rust-bundles
    if: |
      needs.changes.outputs.linux_packages == 'true' &&
      (github.event_name != 'workflow_dispatch' ||
      inputs.target_arch == 'all' ||
      inputs.target_arch == matrix.arch)
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner_label: build-amd64
            nfpm_arch: amd64
          - arch: arm64
            runner_label: build-arm64
            nfpm_arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary bundle
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
          GITHUB_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
          IMAGE_TAG: ${{ needs.metadata.outputs.image_tag }}
          GITEA_BASE_URL: ${{ needs.metadata.outputs.gitea_base_url }}
          PACKAGE_NAMESPACE: ${{ needs.metadata.outputs.namespace }}
          BUNDLE_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          registry_username="${REGISTRY_USERNAME:-${GITHUB_ACTOR_NAME}}"
          registry_password="${REGISTRY_PASSWORD:-${GITHUB_TOKEN_FALLBACK:-}}"
          package_name="$(basename "${ARTIFACT_REPOSITORY}")-${BUNDLE_ARCH}"
          package_version="rust-binaries-${IMAGE_TAG}"
          artifact_file="attune-binaries-${BUNDLE_ARCH}.tar.gz"
          package_url="${GITEA_BASE_URL}/api/packages/${PACKAGE_NAMESPACE}/generic/${package_name}/${package_version}/${artifact_file}"

          echo "Downloading binary bundle from ${package_url}"
          curl -sS -f -u "${registry_username}:${registry_password}" \
            -o "${artifact_file}" "${package_url}"

          mkdir -p dist/bundle
          tar -xzf "${artifact_file}" -C dist/bundle
          echo "Bundle contents:"
          find dist/bundle -type f | sort

      - name: Install nfpm
        shell: bash
        run: |
          set -euo pipefail
          NFPM_VERSION="2.41.1"
          case "$(uname -m)" in
            x86_64) NFPM_ARCH="x86_64" ;;
            aarch64) NFPM_ARCH="arm64" ;;
          esac
          curl -sLo /tmp/nfpm.tar.gz \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_${NFPM_ARCH}.tar.gz"
          tar -xzf /tmp/nfpm.tar.gz -C /tmp nfpm
          sudo mv /tmp/nfpm /usr/local/bin/nfpm
          rm -f /tmp/nfpm.tar.gz
          nfpm --version

      - name: Resolve version
        id: version
        shell: bash
        env:
          IMAGE_TAG: ${{ needs.metadata.outputs.image_tag }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          # Use image_tag for version (strips leading 'v' for release tags).
          version="${IMAGE_TAG#v}"
          # Linux package managers require versions to start with a digit, and
          # branch builds also need monotonic upgrade ordering. Keep release tags
          # unchanged, but turn SHA image tags into ordered package versions like
          # 0.0.0.git.123.sha.abc123.
          version="$(printf '%s' "$version" | sed 's/[^0-9A-Za-z.+~]/./g')"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]'; then
            version="0.0.0.git.${RUN_NUMBER}.${version}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Package version: $version"

      - name: Build packages
        shell: bash
        env:
          BUNDLE_DIR: ${{ github.workspace }}/dist/bundle
          ARCH: ${{ matrix.nfpm_arch }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          ./scripts/build-linux-packages.sh "$BUNDLE_DIR" "$ARCH" "$VERSION"

      - name: Publish Debian packages
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
          GITHUB_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
          GITEA_BASE_URL: ${{ needs.metadata.outputs.gitea_base_url }}
          PACKAGE_NAMESPACE: ${{ needs.metadata.outputs.namespace }}
        run: |
          set -euo pipefail
          registry_username="${REGISTRY_USERNAME:-${GITHUB_ACTOR_NAME}}"
          registry_password="${REGISTRY_PASSWORD:-${GITHUB_TOKEN_FALLBACK:-}}"

          upload_with_retry() {
            local package_file="$1"
            local upload_url="$2"
            local response_file="$3"
            local status
            local attempt
            local max_attempts=5
            local delay_seconds=2

            for ((attempt = 1; attempt <= max_attempts; attempt++)); do
              echo "  Upload attempt ${attempt}/${max_attempts}" >&2
              status=$(curl -sS -o "$response_file" -w '%{http_code}' \
                -u "${registry_username}:${registry_password}" \
                --upload-file "$package_file" \
                "$upload_url")

              if [[ "$status" =~ ^5[0-9][0-9]$ && "$attempt" -lt "$max_attempts" ]]; then
                echo "  ⚠ Registry returned HTTP $status; retrying in ${delay_seconds}s" >&2
                sleep "$delay_seconds"
                delay_seconds=$((delay_seconds * 2))
                continue
              fi

              printf '%s' "$status"
              return 0
            done
          }

          for deb_file in dist/packages/*.deb; do
            [ -f "$deb_file" ] || continue
            echo "Publishing $(basename "$deb_file") to Debian registry"

            upload_url="${GITEA_BASE_URL}/api/packages/${PACKAGE_NAMESPACE}/debian/pool/stable/main/upload"
            status=$(upload_with_retry "$deb_file" "$upload_url" /tmp/deb-upload-response.txt)

            case "$status" in
              201) echo "  ✓ Published" ;;
              409) echo "  ⚠ Already exists (skipped)" ;;
              *) echo "  ✗ Failed (HTTP $status)"; cat /tmp/deb-upload-response.txt; exit 1 ;;
            esac
          done

      - name: Publish RPM packages
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
          GITHUB_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
          GITEA_BASE_URL: ${{ needs.metadata.outputs.gitea_base_url }}
          PACKAGE_NAMESPACE: ${{ needs.metadata.outputs.namespace }}
        run: |
          set -euo pipefail
          registry_username="${REGISTRY_USERNAME:-${GITHUB_ACTOR_NAME}}"
          registry_password="${REGISTRY_PASSWORD:-${GITHUB_TOKEN_FALLBACK:-}}"

          upload_with_retry() {
            local package_file="$1"
            local upload_url="$2"
            local response_file="$3"
            local status
            local attempt
            local max_attempts=5
            local delay_seconds=2

            for ((attempt = 1; attempt <= max_attempts; attempt++)); do
              echo "  Upload attempt ${attempt}/${max_attempts}" >&2
              status=$(curl -sS -o "$response_file" -w '%{http_code}' \
                -u "${registry_username}:${registry_password}" \
                --upload-file "$package_file" \
                "$upload_url")

              if [[ "$status" =~ ^5[0-9][0-9]$ && "$attempt" -lt "$max_attempts" ]]; then
                echo "  ⚠ Registry returned HTTP $status; retrying in ${delay_seconds}s" >&2
                sleep "$delay_seconds"
                delay_seconds=$((delay_seconds * 2))
                continue
              fi

              printf '%s' "$status"
              return 0
            done
          }

          for rpm_file in dist/packages/*.rpm; do
            [ -f "$rpm_file" ] || continue
            echo "Publishing $(basename "$rpm_file") to RPM registry"

            upload_url="${GITEA_BASE_URL}/api/packages/${PACKAGE_NAMESPACE}/rpm/el9/upload"
            status=$(upload_with_retry "$rpm_file" "$upload_url" /tmp/rpm-upload-response.txt)

            case "$status" in
              201) echo "  ✓ Published" ;;
              409) echo "  ⚠ Already exists (skipped)" ;;
              *) echo "  ✗ Failed (HTTP $status)"; cat /tmp/rpm-upload-response.txt; exit 1 ;;
            esac
          done

      - name: Publish Arch packages
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
          GITHUB_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
          GITEA_BASE_URL: ${{ needs.metadata.outputs.gitea_base_url }}
          PACKAGE_NAMESPACE: ${{ needs.metadata.outputs.namespace }}
        run: |
          set -euo pipefail
          registry_username="${REGISTRY_USERNAME:-${GITHUB_ACTOR_NAME}}"
          registry_password="${REGISTRY_PASSWORD:-${GITHUB_TOKEN_FALLBACK:-}}"

          upload_with_retry() {
            local package_file="$1"
            local upload_url="$2"
            local response_file="$3"
            local status
            local attempt
            local max_attempts=5
            local delay_seconds=2

            for ((attempt = 1; attempt <= max_attempts; attempt++)); do
              echo "  Upload attempt ${attempt}/${max_attempts}" >&2
              status=$(curl -sS -o "$response_file" -w '%{http_code}' \
                -u "${registry_username}:${registry_password}" \
                --upload-file "$package_file" \
                "$upload_url")

              if [[ "$status" =~ ^5[0-9][0-9]$ && "$attempt" -lt "$max_attempts" ]]; then
                echo "  ⚠ Registry returned HTTP $status; retrying in ${delay_seconds}s" >&2
                sleep "$delay_seconds"
                delay_seconds=$((delay_seconds * 2))
                continue
              fi

              printf '%s' "$status"
              return 0
            done
          }

          for pkg_file in dist/packages/*.pkg.tar.zst; do
            [ -f "$pkg_file" ] || continue
            echo "Publishing $(basename "$pkg_file") to Arch registry"

            upload_url="${GITEA_BASE_URL}/api/packages/${PACKAGE_NAMESPACE}/arch/core"
            status=$(upload_with_retry "$pkg_file" "$upload_url" /tmp/arch-upload-response.txt)

            case "$status" in
              201) echo "  ✓ Published" ;;
              409) echo "  ⚠ Already exists (skipped)" ;;
              *) echo "  ✗ Failed (HTTP $status)"; cat /tmp/arch-upload-response.txt; exit 1 ;;
            esac
          done

  publish-docker-dist:
    name: Publish Docker Dist Bundle
    runs-on: build-amd64
    needs:
      - metadata
      - changes
    if: needs.changes.outputs.docker_dist == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docker dist bundle
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/package-docker-dist.sh docker/distributable artifacts/attune-docker-dist.tar.gz

      - name: Publish docker dist generic package
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
          GITEA_BASE_URL: ${{ needs.metadata.outputs.gitea_base_url }}
          OWNER_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "${REGISTRY_USERNAME:-}" ] || [ -z "${REGISTRY_PASSWORD:-}" ]; then
            echo "CONTAINER_REGISTRY_USERNAME and CONTAINER_REGISTRY_PASSWORD are required to publish the docker dist package"
            exit 1
          fi

          owner="${{ needs.metadata.outputs.namespace }}"
          package_name="attune-docker-dist"
          package_version="${{ needs.metadata.outputs.image_tag }}"
          file_name="attune-docker-dist.tar.gz"
          api_base="${{ needs.metadata.outputs.gitea_base_url }}/api/packages"
          package_url="${api_base}/${owner}/generic/${package_name}/${package_version}/${file_name}"

          # Generic packages reject overwriting the same file name. Delete it first on reruns.
          delete_status="$(curl -sS -o /tmp/docker-dist-delete-response.txt -w '%{http_code}' \
            -u "${REGISTRY_USERNAME}:${REGISTRY_PASSWORD}" \
            -X DELETE \
            "${package_url}")"

          case "${delete_status}" in
            204|404)
              ;;
            *)
              echo "Failed to prepare generic package upload target"
              cat /tmp/docker-dist-delete-response.txt
              exit 1
              ;;
          esac

          upload_status="$(curl -sS -o /tmp/docker-dist-upload-response.txt -w '%{http_code}' \
            -u "${REGISTRY_USERNAME}:${REGISTRY_PASSWORD}" \
            --upload-file artifacts/attune-docker-dist.tar.gz \
            -X PUT \
            "${package_url}")"

          case "${upload_status}" in
            201)
              ;;
            *)
              echo "Failed to publish docker dist generic package"
              cat /tmp/docker-dist-upload-response.txt
              exit 1
              ;;
          esac

      - name: Attach docker dist archive to release
        if: github.ref_type == 'tag'
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${REGISTRY_USERNAME:-}" ] || [ -z "${REGISTRY_PASSWORD:-}" ]; then
            echo "CONTAINER_REGISTRY_USERNAME and CONTAINER_REGISTRY_PASSWORD are required to attach the docker dist archive to a release"
            exit 1
          fi

          api_base="${GITEA_BASE_URL}/api/v1"
          owner_repo="${OWNER_REPO}"
          tag_name="${TAG_NAME}"
          archive_path="artifacts/attune-docker-dist.tar.gz"
          asset_name="attune-docker-dist-${tag_name}.tar.gz"

          release_response_file="$(mktemp)"
          status_code="$(curl -sS -o "${release_response_file}" -w '%{http_code}' \
            -u "${REGISTRY_USERNAME}:${REGISTRY_PASSWORD}" \
            "${api_base}/repos/${owner_repo}/releases/tags/${tag_name}")"

          if [ "${status_code}" = "404" ]; then
            create_payload="$(TAG_NAME="${tag_name}" python3 - <<'PY'
            import json
            import os

            tag = os.environ["TAG_NAME"]
            print(json.dumps({
                "tag_name": tag,
                "name": tag,
                "draft": False,
                "prerelease": "-" in tag,
            }))
            PY
            )"

            status_code="$(curl -sS -o "${release_response_file}" -w '%{http_code}' \
              -u "${REGISTRY_USERNAME}:${REGISTRY_PASSWORD}" \
              -H "Content-Type: application/json" \
              -X POST \
              -d "${create_payload}" \
              "${api_base}/repos/${owner_repo}/releases")"
          fi

          case "${status_code}" in
            200|201)
              ;;
            *)
              echo "Failed to fetch or create release for tag ${tag_name}"
              cat "${release_response_file}"
              exit 1
              ;;
          esac

          release_id="$(python3 - "${release_response_file}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as fh:
              data = json.load(fh)
          print(data["id"])
          PY
          )"

          existing_asset_id="$(python3 - "${release_response_file}" "${asset_name}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as fh:
              data = json.load(fh)
          name = sys.argv[2]
          for asset in data.get("assets", []):
              if asset.get("name") == name:
                  print(asset["id"])
                  break
          PY
          )"

          if [ -n "${existing_asset_id}" ]; then
            curl -sS \
              -u "${REGISTRY_USERNAME}:${REGISTRY_PASSWORD}" \
              -X DELETE \
              "${api_base}/repos/${owner_repo}/releases/${release_id}/assets/${existing_asset_id}" \
              >/dev/null
          fi

          encoded_asset_name="$(ASSET_NAME="${asset_name}" python3 - <<'PY'
          import os
          import urllib.parse

          print(urllib.parse.quote(os.environ["ASSET_NAME"], safe=""))
          PY
          )"

          upload_response_file="$(mktemp)"
          status_code="$(curl -sS -o "${upload_response_file}" -w '%{http_code}' \
            -u "${REGISTRY_USERNAME}:${REGISTRY_PASSWORD}" \
            -H "Content-Type: application/gzip" \
            --data-binary "@${archive_path}" \
            "${api_base}/repos/${owner_repo}/releases/${release_id}/assets?name=${encoded_asset_name}")"

          case "${status_code}" in
            201)
              ;;
            *)
              echo "Failed to upload release asset ${asset_name}"
              cat "${upload_response_file}"
              exit 1
              ;;
          esac

  publish-helm-chart:
    name: Publish Helm Chart
    runs-on: build-amd64
    needs:
      - metadata
      - changes
    timeout-minutes: 10
    if: needs.changes.outputs.helm == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Helm binary
        id: cache-helm
        uses: actions/cache@v4
        with:
          path: /toolcache/helm/4.1.4
          key: helm-v4.1.4-linux-amd64

      - name: Install Helm
        shell: bash
        run: |
          set -euo pipefail
          helm_bin="/toolcache/helm/4.1.4/helm"

          if [ ! -x "$helm_bin" ]; then
            echo "Cache miss — downloading Helm v4.1.4 from Gitea"
            mkdir -p /toolcache/helm/4.1.4
            curl -fsSL \
              -o /tmp/helm.tar.gz \
              "https://git.rdrx.app/api/packages/mirrors/generic/helm-binary/4.1.4/helm-linux-amd64.tar.gz"
            tar -xzf /tmp/helm.tar.gz -C /tmp
            mv /tmp/linux-amd64/helm "$helm_bin"
            chmod +x "$helm_bin"
          else
            echo "Cache hit — using cached Helm v4.1.4"
          fi

          sudo ln -sf "$helm_bin" /usr/local/bin/helm
          helm version

      - name: Package Helm chart
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/helm
          helm package charts/attune \
            --version "${{ needs.metadata.outputs.chart_version }}" \
            --app-version "${{ needs.metadata.outputs.image_tag }}" \
            --destination dist/helm

      - name: Publish Helm chart package
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${REGISTRY_USERNAME:-}" ] || [ -z "${REGISTRY_PASSWORD:-}" ]; then
            echo "CONTAINER_REGISTRY_USERNAME and CONTAINER_REGISTRY_PASSWORD are required to publish the Helm chart"
            exit 1
          fi

          package_file="dist/helm/attune-${{ needs.metadata.outputs.chart_version }}.tgz"
          upload_url="${{ needs.metadata.outputs.gitea_base_url }}/api/packages/${{ needs.metadata.outputs.namespace }}/helm/api/charts"

          echo "Publishing Helm chart"
          echo "  chart_version: ${{ needs.metadata.outputs.chart_version }}"
          echo "  app_version: ${{ needs.metadata.outputs.image_tag }}"
          echo "  upload_url: ${upload_url}"
          echo "  package_file: ${package_file}"

          status_code="$(curl -sS -o /tmp/helm-chart-upload-response.txt -w '%{http_code}' \
            -u "${REGISTRY_USERNAME}:${REGISTRY_PASSWORD}" \
            -X POST \
            --upload-file "${package_file}" \
            "${upload_url}")"

          case "${status_code}" in
            201|409)
              ;;
            *)
              echo "Failed to publish Helm chart"
              cat /tmp/helm-chart-upload-response.txt
              exit 1
              ;;
          esac

  publish-rust-images:
