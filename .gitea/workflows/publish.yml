            image:
              name: init-user
              repository: attune/init-user
              source_path: ""
              dockerfile: docker/Dockerfile.init-user-package
          - arch: arm64
            runner_label: build-arm64
            platform: linux/arm64
            image:
              name: init-packs
              repository: attune/init-packs
              source_path: ""
              dockerfile: docker/Dockerfile.init-packs-package
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        if: needs.metadata.outputs.registry_plain_http != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Setup Docker Buildx For Plain HTTP Registry
        if: needs.metadata.outputs.registry_plain_http == 'true'
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."${{ needs.metadata.outputs.registry }}"]
              http = true
              insecure = true

      - name: Log in to registry
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
          GITHUB_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
        run: |
          set -euo pipefail
          registry_username="${REGISTRY_USERNAME:-${GITHUB_ACTOR_NAME}}"
          registry_password="${REGISTRY_PASSWORD:-${GITHUB_TOKEN_FALLBACK:-}}"

          if [ -z "$registry_password" ]; then
            echo "Set CONTAINER_REGISTRY_PASSWORD or enable GITHUB_TOKEN package writes"
            exit 1
          fi

          mkdir -p "$HOME/.docker"
          auth="$(printf '%s:%s' "$registry_username" "$registry_password" | base64 | tr -d '\n')"

          cat > "$HOME/.docker/config.json" <<EOF
          {
            "auths": {
              "${{ needs.metadata.outputs.registry }}": {
                "auth": "${auth}"
              }
            }
          }
          EOF

      - name: Pull binary bundle
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
          GITHUB_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR_NAME: ${{ github.actor }}
        run: |
          set -euo pipefail
          registry_username="${REGISTRY_USERNAME:-${GITHUB_ACTOR_NAME}}"
          registry_password="${REGISTRY_PASSWORD:-${GITHUB_TOKEN_FALLBACK:-}}"
          artifact_file="attune-binaries-${{ matrix.arch }}.tar.gz"
          package_name="$(basename "${ARTIFACT_REPOSITORY}")-${{ matrix.arch }}"
          package_version="rust-binaries-${{ needs.metadata.outputs.image_tag }}"
          package_url="${{ needs.metadata.outputs.gitea_base_url }}/api/packages/${{ needs.metadata.outputs.namespace }}/generic/${package_name}/${package_version}/${artifact_file}"

          if [ -z "$registry_password" ]; then
            echo "Set CONTAINER_REGISTRY_PASSWORD or enable GITHUB_TOKEN package writes"
            exit 1
          fi

          echo "Downloading binary bundle generic package"
          echo "  package_name: ${package_name}"
          echo "  package_version: ${package_version}"
          echo "  package_url: ${package_url}"
          echo "  arch: ${{ matrix.arch }}"

          mkdir -p dist/artifact
          cd dist/artifact

          curl -fL -u "${registry_username}:${registry_password}" \
            -o "${artifact_file}" \
            "${package_url}"

          tar -xzf "${artifact_file}"

      - name: Prepare packaging context
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist/image
          mkdir -p dist/image

          echo "Preparing packaging context"
          echo "  image: ${{ matrix.image.name }}"
          echo "  repository: ${{ matrix.image.repository }}"
          echo "  source_path: ${{ matrix.image.source_path }}"
          echo "  dockerfile: ${{ matrix.image.dockerfile }}"

          case "${{ matrix.image.name }}" in
            api|executor|notifier|supervisor)
              cp "dist/artifact/${{ matrix.image.source_path }}" dist/attune-service-binary
              ;;
            agent)
              cp dist/artifact/agent/attune-agent dist/attune-agent
              cp dist/artifact/agent/attune-sensor-agent dist/attune-sensor-agent
              cp dist/artifact/agent/attune-mcp dist/attune-mcp
              cp dist/artifact/agent/attune dist/attune
              ;;
            migrations|init-user|init-packs)
              ;;
            *)
              echo "Unsupported image: ${{ matrix.image.name }}"
              exit 1
              ;;
          esac

      - name: Push architecture image
        shell: bash
        run: |
          set -euo pipefail

          run_with_retries() {
            local max_attempts="$1"
            local delay_seconds="$2"
            shift 2

            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi

              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${attempt} attempts: $*"
                return 1
              fi

              echo "Command failed on attempt ${attempt}/${max_attempts}: $*"
              echo "Retrying in ${delay_seconds}s..."
              sleep "$delay_seconds"
              attempt=$((attempt + 1))
            done
          }

          image_ref="${{ needs.metadata.outputs.registry }}/${{ needs.metadata.outputs.namespace }}/${{ matrix.image.repository }}:${{ needs.metadata.outputs.image_tag }}-${{ matrix.arch }}"

          build_cmd=(
            docker buildx build
            .
            --platform "${{ matrix.platform }}"
            --file "${{ matrix.image.dockerfile }}"
            --provenance=false
            --sbom=false
          )

          if [ "${{ needs.metadata.outputs.registry_plain_http }}" = "true" ]; then
            build_cmd+=(--output "type=image,\"name=${image_ref}\",push=true,registry.insecure=true")
          else
            build_cmd+=(--tag "$image_ref" --push)
          fi

          echo "Publishing architecture image"
          echo "  image: ${{ matrix.image.name }}"
          echo "  repository: ${{ matrix.image.repository }}"
          echo "  platform: ${{ matrix.platform }}"
          echo "  dockerfile: ${{ matrix.image.dockerfile }}"
          echo "  destination: ${image_ref}"
          echo "  plain_http: ${{ needs.metadata.outputs.registry_plain_http }}"

          run_with_retries 3 5 "${build_cmd[@]}"

